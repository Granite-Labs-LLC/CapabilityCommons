updated_at: '2026-03-13'
payload:
  performance_statement: Use labels, placement rules, and a simple review schedule to keep pantry stock fresh and aligned to actual use.
  inputs:
  - pantry layout
  - current stock
  - date labels
  - review interval
  tools:
  - marker
  - labels
  - shelf or bin system
  - inventory sheet
  materials:
  - rotation sheet
  steps_summary:
  - Group items by use, shelf life, and replacement frequency.
  - Place older stock in front and newer stock in back.
  - Record quantities and trigger points for replenishment.
  - Review the pantry on a repeating schedule.
  - Retire, donate, or repurpose items before they become waste.
  success_criteria:
  - The household can find and use stock without guesswork.
  - Review dates and reorder triggers are visible.
  - Expired or stale items are not accumulating unnoticed.
  failure_modes:
  - Buying without a rotation habit.
  - Storing items that no one regularly cooks or eats.
  - Failing to set reorder triggers.
  safety_boundary: Follow local food-safety guidance and product labeling; when in doubt about safety, discard rather than gamble.
