payload:
  definition: A simple model of how heat, air, and moisture move through walls, roofs, floors, windows, and gaps.
  key_questions:
  - Where does heat escape or enter most easily?
  - How do air leaks differ from insulation gaps?
  - When does moisture turn from nuisance into building damage?
  misconceptions:
  - Insulation alone solves all comfort problems.
  - Condensation is purely cosmetic.
  - More sealing is always better even if ventilation is ignored.
  formulas_or_rules:
  - Air sealing and insulation solve different but related problems.
  - Warm air carries moisture; moisture management is part of durability.
  - Control layers work best when they are continuous.
  units:
  - degree F
  - degree C
  - R-value
  - humidity
  - square foot
