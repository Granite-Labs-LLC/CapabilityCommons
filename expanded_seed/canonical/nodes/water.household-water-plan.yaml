source_refs: []
version: 1.0.0
updated_at: '2026-03-13'
payload:
  goal: Build a household-ready plan that covers how much water is needed, where it comes from, how it is treated, how it is tested, and what to do when one path fails.
  deliverables:
  - household water plan
  - source and storage map
  - treatment decision matrix
  - retest schedule
  acceptance_criteria:
  - The plan covers drinking, hygiene, food prep, pets, and essential cleaning where relevant.
  - At least one backup source or fallback path is named.
  - The plan can be followed by another household member without additional explanation.
  time_box_hours: 3.0
  budget_band: low
  team_size: 1
