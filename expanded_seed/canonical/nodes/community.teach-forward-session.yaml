payload:
  goal: Prepare and deliver a short lesson that transfers one usable capability and leaves behind a handout, checklist, or map that others can reuse.
  deliverables:
  - lesson plan
  - one-page handout
  - micro-session notes
  - participant feedback notes
  acceptance_criteria:
