payload:
  performance_statement: Create a clear map of a household or local system that shows how resources flow, where bottlenecks exist, and what fails first.
  inputs:
  - target system
  - basic measurements
  - known dependencies
  - failure scenarios
  tools:
  - paper or whiteboard
  - markers
  - camera or scanner (optional)
  materials:
  - system mapping template
  steps_summary:
  - Choose a system boundary such as water, food, shelter, or power.
  - List inputs, outputs, storage points, dependencies, and single points of failure.
  - Mark critical nodes, backup paths, and failure consequences.
  - Rank which dependencies are easy, medium, or hard to replace.
  - Convert the map into a one-page operating view.
  success_criteria:
  - The map shows inputs, outputs, and at least one likely failure path.
  - Critical dependencies are visible and ranked.
  - Another person can read the map and understand the system.
  failure_modes:
  - Drawing a process list instead of a system map.
  - Ignoring hidden dependencies such as fuel, internet, or weather.
  - Making the diagram so detailed that it cannot guide action.
  safety_boundary: This activity is observational and planning-oriented; do not test failure scenarios on live systems unless it is safe and reversible.
