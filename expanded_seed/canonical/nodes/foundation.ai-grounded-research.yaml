payload:
  performance_statement: Use AI to speed up explanation and comparison while preserving a verifiable chain back to sources, dates, and local constraints.
  inputs:
  - question or task
  - source material
  - local context such as budget or climate
  tools:
  - AI assistant
  - browser
  - note template
  materials:
  - prompt pack
  - claim-check worksheet
  steps_summary:
  - Frame the task in plain language and define the decision to be made.
  - Ask AI to summarize and compare sources with explicit citations or references.
  - Cross-check the high-risk or time-sensitive claims against primary or recent sources.
  - Ask AI to localize the plan by budget, region, housing type, or available tools.
  - Save the final decision note with sources and caveats.
  success_criteria:
  - The output names which claims were source-checked.
  - The learner can explain where AI helped and where human verification took over.
  - The final note is adapted to a real local scenario.
  failure_modes:
  - Accepting confident wording as evidence.
  - Prompting for conclusions without defining constraints.
  - Forgetting to verify recency, law, code, or safety boundaries.
  safety_boundary: AI outputs are draft material; do not use them as sole authority for code, medicine, legal matters, or high-risk technical action.
