updated_at: '2026-03-13'
payload:
  performance_statement: Find the key shutoffs, assemble a small response kit, and apply simple reversible fixes for gaps, drips, and minor surface damage.
  inputs:
  - household layout
  - known utility fixtures
  - minor repair materials
  tools:
  - flashlight
  - hand tools
  - marker
  - camera
  materials:
  - sealants or weatherstripping
  - absorbent materials
  - temporary patch supplies
  - checklist
  steps_summary:
  - Locate water and utility shutoffs and label or map them.
  - Assemble a small kit for leaks, drafts, and minor patching.
  - Apply simple sealing or temporary patching to a low-risk target.
  - Document what worked, what did not, and what still needs escalation.
  - Store the map and kit where others can find them.
  success_criteria:
  - Shutoff locations are recorded and usable under stress.
  - The patch or seal improves the problem without creating a larger one.
  - The learner can tell temporary repair from durable repair.
  failure_modes:
  - Not knowing the right shutoff until an emergency starts.
  - Using the wrong sealant or patch for the material or moisture condition.
  - Treating a temporary fix as a permanent solution.
  safety_boundary: Temporary repairs buy time; stop and escalate when structural, electrical, gas, or concealed damage is possible.
