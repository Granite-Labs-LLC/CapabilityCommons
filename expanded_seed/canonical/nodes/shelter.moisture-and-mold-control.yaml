updated_at: '2026-03-13'
payload:
  performance_statement: Identify likely moisture sources, document conditions that keep surfaces damp, and create a response plan that removes the source or shortens exposure.
  inputs:
  - visible conditions
  - humidity or dampness observations
  - space usage patterns
  tools:
  - flashlight
  - checklist
  - camera or notebook
  materials:
  - moisture checklist
  steps_summary:
  - Inspect areas near plumbing, exterior walls, windows, bathrooms, kitchens, and basements or crawlspaces.
  - 'Classify the moisture source: leak, condensation, infiltration, or occupant load.'
  - 'Record what keeps the area damp: poor airflow, low heat, trapped vapor, or repeated wetting.'
  - Choose corrective actions that target the source first.
  - Set a follow-up check date.
  success_criteria:
  - The response plan targets the source, not only the surface.
  - Areas needing escalation are clearly identified.
  - The learner can explain the difference between leak-driven and condensation-driven problems.
  failure_modes:
  - Treating visible mold as only a cleaning problem.
  - Ignoring intermittent leaks or seasonal condensation patterns.
  - Failing to recheck after the first intervention.
  safety_boundary: Escalate persistent, extensive, or health-sensitive cases to qualified local guidance; do not disturb hazardous materials or hidden cavities without appropriate precautions.
