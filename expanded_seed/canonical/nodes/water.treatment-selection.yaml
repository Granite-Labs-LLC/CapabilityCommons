payload:
  definition: A decision framework for matching likely water hazards to suitable treatment methods and limits.
  key_questions:
  - 'What problem am I treating: particles, microbes, chemicals, or salinity?'
  - What does this treatment remove well, poorly, or not at all?
  - What are the capacity, maintenance, and failure signs of the method?
  misconceptions:
  - All filters remove all contaminants.
  - Clear water is necessarily safe water.
  - Boiling solves chemical contamination.
  formulas_or_rules:
  - Match method to contaminant class.
  - Multiple barriers are often stronger than one.
  - Capacity, contact time, and maintenance matter as much as device choice.
  units:
  - microns
  - liters
  - gallons
  - minutes
  - ppm
