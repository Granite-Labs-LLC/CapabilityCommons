updated_at: '2026-03-13'
payload:
  definition: A conceptual boundary map showing which preservation methods fit which foods, what their limits are, and when guidance must come from authoritative process sources.
  key_questions:
  - Which preservation methods are low-risk vs higher-risk?
  - What environmental factors make preserved food safer or less safe?
  - When is authoritative process guidance essential?
  misconceptions:
  - Any preserved food that looks fine is safe.
  - A successful batch proves the method was sound.
  - Drying, fermenting, freezing, and canning have the same risk profile.
  formulas_or_rules:
  - Match method to food type and moisture/acid profile.
  - Use authoritative process guidance for higher-risk methods.
  - When a method depends on exact procedure, improvisation shrinks safety margin.
  units:
  - time
  - temperature
  - pH
  - water activity
