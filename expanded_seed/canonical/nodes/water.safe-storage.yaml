payload:
  performance_statement: Calculate water quantities for a time window, choose appropriate containers, and label and rotate stored water correctly.
  inputs:
  - household size
  - storage duration
  - container options
  - space constraints
  tools:
  - marker
  - measuring container
  - storage worksheet
  materials:
  - food-safe containers
  - labels
  - cleaning supplies
  steps_summary:
  - Estimate minimum and preferred daily water quantities per person and use case.
  - Match the total volume to actual containers and storage locations.
  - Label date, source, intended use, and rotation interval.
  - Separate drinking water from utility water if using both.
  - Record the plan in a storage table.
  success_criteria:
  - The plan covers at least one minimum-duration target.
  - Containers are identified, dated, and assigned to uses.
  - Storage locations are realistic for the dwelling.
  failure_modes:
  - Using unknown or contaminated containers.
  - Storing too little water for heat, pets, or sanitation needs.
  - Failing to label and rotate containers.
  safety_boundary: Use only appropriate containers and local health guidance; storage does not replace proper treatment when source quality is uncertain.
