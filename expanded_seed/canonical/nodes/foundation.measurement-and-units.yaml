payload:
  definition: A shared language of quantity that allows materials, loads, water, time, and space to be compared without confusion.
  key_questions:
  - What quantity am I measuring?
  - What unit is appropriate for this decision?
  - How do I convert between common household and technical units?
  misconceptions:
  - Precision and accuracy are the same thing.
  - Bigger numbers always mean more capacity regardless of unit.
  - Approximation is useless unless it is exact.
  formulas_or_rules:
  - Choose one working unit before calculating.
  - Write units next to every number.
  - Estimate first, then calculate, then sense-check.
  units:
  - gallon
  - liter
  - watt
  - watt-hour
  - volt
  - amp
  - square foot
  - degree F
  - degree C
  - psi
