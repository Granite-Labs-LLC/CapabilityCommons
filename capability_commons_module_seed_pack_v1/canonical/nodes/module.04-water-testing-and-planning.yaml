payload:
  week: 4
  node_refs:
  - water.basic-testing
  - water.household-water-plan
  learning_objectives:
  - Run basic water testing or inspection steps and record the results clearly.
  - Convert storage, source, and treatment choices into a household water plan.
  - Explain when a plan should be retested, expanded, or revised.
  seminar_outline:
  - What basic household water tests can and cannot tell you
  - Logging results, assumptions, and retest intervals
  - Building 72-hour and 2-week water plans
  - Source diversity, redundancy, and revision triggers
  lab: Complete a sample test log and use it to draft a household water plan with
    source, storage, and retest assumptions.
  field_task: Create a 72-hour and 2-week household water plan using your actual storage,
    likely sources, and one retest schedule.
  teach_forward_task: Walk another person through your water plan and have them identify
    one assumption they would verify before relying on it.
