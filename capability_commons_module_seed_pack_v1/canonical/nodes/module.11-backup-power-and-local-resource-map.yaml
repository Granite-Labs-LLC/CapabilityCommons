title: 'Power III and Community Layer: Backup Planning and Local Resource Mapping'
summary: Produce tiered backup power options and connect them to a local map of skills,
  tools, places, and shared assets.
plain_language: This module helps you compare backup options realistically and then
  locate the people and resources nearby that increase resilience.
