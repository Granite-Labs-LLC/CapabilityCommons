payload:
  week: 11
  node_refs:
  - power.backup-power-plan
  - community.local-resource-map
  learning_objectives:
  - Draft low-, mid-, and high-budget backup options matched to critical loads and
    runtime goals.
  - Compare backup options by capability, burden, and local constraints.
  - Map local skills, tools, spaces, and sources that matter during normal times and
    disruptions.
  seminar_outline:
  - Tiered backup planning instead of one-shot ideal purchases
  - 'Tradeoffs: cost, maintenance, storage, fuel, noise, and constraints'
  - What belongs on a local resource map
  - Privacy, permission, and useful coordination notes
  lab: Build a budget-tier comparison for backup options and sketch a first-pass local
    resource map with contacts and capabilities.
  field_task: Complete one backup power plan and one local resource map using actual
    local constraints, contacts, and likely outage priorities.
  teach_forward_task: Explain to another person why your preferred backup tier fits
    your situation and point out two nearby resources that reduce isolation.
  deliverable_refs:
  - backup power plan
  - budget-tier comparison
  - decision log
  - local resource map
  - contact and capability list
  - sharing protocol notes
  assessment_ref: assessment.module.11
  delivery_profile:
