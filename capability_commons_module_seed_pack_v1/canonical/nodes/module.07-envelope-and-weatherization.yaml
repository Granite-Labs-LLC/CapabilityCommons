payload:
  week: 7
  node_refs:
  - shelter.building-envelope
  - shelter.weatherization-audit
  learning_objectives:
  - Explain the basic relationship between heat flow, air leakage, and the building
    envelope.
  - Inspect a space for likely weatherization priorities using a repeatable audit
    method.
  - Rank fixes by impact, effort, and constraints.
  seminar_outline:
  - Heat, air, moisture, and why comfort is not one variable
  - Where buildings commonly leak or lose performance
  - Audit methods and prioritizing fixes
  - Temporary versus durable weatherization choices
  lab: Use a room-by-room worksheet to identify likely leakage points and draft a
    weatherization priority list.
  field_task: Complete a weatherization audit for one dwelling or one zone of a dwelling
    and record the first fixes worth testing.
  teach_forward_task: Walk another person through one room and explain what you would
    improve first and why.
