  learning_objectives:
  - Start seeds with workable timing, medium, light, and moisture conditions.
  - Plan a small bed or container garden around space, season, and care capacity.
  - Translate garden goals into a layout, crop plan, and simple care calendar.
  seminar_outline:
  - What makes early garden attempts fail
  - Seed starting setup, moisture, light, and timing
  - Beds versus containers, crop choice, and season planning
  - Designing for reliability instead of maximal ambition
  lab: Build or simulate a germination setup and sketch a garden layout with crop
    timing and care needs.
  field_task: Start at least one crop or complete a full container or bed plan with
    dates, spacing, and care calendar entries.
  teach_forward_task: Explain your crop plan to another person and have them identify
    whether the plan matches your actual time and space.
