payload:
  week: 2
  node_refs:
  - foundation.measurement-and-units
  - foundation.systems-mapping
  - foundation.household-resilience-inventory
  learning_objectives:
  - Choose and convert the units needed for common household calculations.
  - Map inputs, outputs, dependencies, and failure points in a household system.
  - Create a baseline resilience inventory covering needs, tools, contacts, and gaps.
  seminar_outline:
  - Units as the language of planning
  - System boundaries, dependencies, and failure points
  - From inventory to priority setting
  - How this baseline supports every later module
  lab: Build a simple conversion sheet, sketch one household system, and turn the
    results into an initial resilience inventory.
  field_task: Complete a household resilience inventory covering water, food, power,
    heat, tools, contacts, and the most obvious vulnerabilities.
  teach_forward_task: Explain one system map to another household member and identify
    the first two weak links you both agree on.
  deliverable_refs:
  - units cheat sheet
  - conversion table
  - household systems map
  - dependency list
  - household inventory sheet
  - priority gap list
