payload:
  week: 5
  node_refs:
  - food.pantry-design
  - food.pantry-rotation
  - food.safe-preservation-basics
  learning_objectives:
  - Design a pantry layout around household needs, constraints, and likely gaps.
  - Set up a rotation and reorder cadence that prevents hidden waste.
  - Explain the safety boundaries of common preservation methods in plain language.
  seminar_outline:
  - Pantry design as a planning problem, not a shopping spree
  - Shelf life, labeling, and reorder cadence
  - Safe boundaries for freezing, drying, fermenting, and canning decisions
  - Low-cost pantry improvements that matter first
  lab: Sort foods by category and shelf life, draft a pantry map, and build a simple
    rotation sheet plus preservation safety card.
  field_task: Map your pantry, label one rotation cycle, and document one low-cost
    improvement you can make immediately.
  teach_forward_task: Show another person how your pantry rotation works and explain
    one preservation method you would not improvise.
