id: module.12-capstone-teach-forward
type: module
title: 'Capstone: Teach Forward and Archive the Capability'
summary: Package one completed capability into a short, usable lesson with a durable
  handout so the knowledge can move beyond the individual learner.
plain_language: This module turns private learning into public usefulness by asking
  you to teach one thing clearly and leave behind something others can reuse.
