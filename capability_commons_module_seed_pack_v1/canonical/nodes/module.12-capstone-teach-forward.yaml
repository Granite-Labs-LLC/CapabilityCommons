payload:
  week: 12
  node_refs:
  - community.teach-forward-session
  learning_objectives:
  - Turn one completed capability into a short lesson with a clear promise, steps,
    and artifact.
  - Translate technical language into terms a general audience can follow.
  - Leave behind a handout, checklist, or map that remains useful without the instructor
    present.
  seminar_outline:
  - Why knowledge transfer is part of capability, not an optional extra
  - Compressing a lesson into 3-minute and 10-minute forms
  - Designing a handout that survives without the teacher
  - Capturing revision notes for the next cohort
  lab: Draft a 10–20 minute lesson plan, build a one-page handout, and rehearse the
    session with timing and feedback.
  field_task: Deliver a short teach-forward session or record a rehearsal, then revise
    the lesson based on the clarity gaps you notice.
  teach_forward_task: This module is itself the teach-forward action; gather one piece
    of feedback and use it to improve the handout or lesson sequence.
  deliverable_refs:
  - lesson plan
  - one-page handout
  - micro-session notes
  assessment_ref: assessment.module.12
  delivery_profile:
    seminar_minutes: 60
    lab_minutes: 90
    field_task_minutes: 90
    teach_forward_minutes: 30
