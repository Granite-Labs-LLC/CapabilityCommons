title: 'Power II: Critical Loads and Runtime'
summary: Turn electrical literacy into an outage load audit and realistic runtime
  estimates based on actual priorities and assumptions.
plain_language: This module helps you decide what must stay on during an outage and
  how long different power sources could support it.
