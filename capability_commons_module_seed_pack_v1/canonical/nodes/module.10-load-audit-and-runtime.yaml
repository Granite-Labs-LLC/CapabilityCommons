payload:
  week: 10
  node_refs:
  - power.load-audit
  - power.runtime-calculation
  learning_objectives:
  - Separate essential, important, and optional loads for different outage durations.
  - Estimate runtime using consistent units, duty cycle, and efficiency assumptions.
  - Document the assumptions that most change your answer.
  seminar_outline:
  - Critical load thinking instead of whole-house fantasy
  - Duty cycle, startup surge, and efficiency loss
  - Runtime calculations with consistent units
  - Recording assumptions and planning margins
  lab: Create a critical load sheet and calculate runtime for at least two outage
    scenarios using one assumed power source.
  field_task: Audit your actual priority devices, assign outage tiers, and complete
    a runtime table that another person could read.
  teach_forward_task: Show another person how one incorrect assumption can make a
    backup plan fail and point to where you documented yours.
  deliverable_refs:
  - load sheet
  - critical load tiers
