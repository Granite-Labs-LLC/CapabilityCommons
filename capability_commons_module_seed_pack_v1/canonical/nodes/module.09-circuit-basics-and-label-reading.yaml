  learning_objectives:
  - Differentiate volts, amps, watts, and watt-hours in plain language.
  - Read device labels and identify what information matters for planning.
  - Explain why breaker limits, startup surges, and real-world usage complicate simple
    guesses.
  seminar_outline:
  - Power versus energy and why the distinction matters
  - What device labels show and what they omit
  - Circuit limits, startup surge, and duty cycle
  - Common beginner mistakes in electrical planning
  lab: Read labels from several devices, convert the numbers into comparable terms,
    and build a power formula card for later modules.
  field_task: Record labels for your most important devices and note any missing information
    or assumptions you still need to verify.
  teach_forward_task: Explain watts versus watt-hours to another person using one
    of your household devices as the example.
