id: module.01-truth-tools-and-ai
type: module
title: Truth, Tools, and AI as Amplifier
summary: Learn how to verify practical claims, use AI to compare sources, and record
  decisions with citations before acting.
plain_language: This module teaches you how to check whether information is real,
  current, and useful before you act on it.
