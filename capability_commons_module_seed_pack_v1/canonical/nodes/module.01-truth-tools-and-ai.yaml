payload:
  week: 1
  node_refs:
  - foundation.verify-and-cite
  - foundation.ai-grounded-research
  learning_objectives:
  - Evaluate a practical claim using source quality, date, evidence, and local applicability.
  - Use AI to summarize, compare, and critique sources without outsourcing judgment.
  - Produce a claim-check worksheet and a short cited recommendation note.
  seminar_outline:
  - Why bad decisions often start with unexamined claims
  - 'Source types: primary, secondary, synthetic, anecdotal'
  - AI as translator, comparator, and critique partner
  - Decision logging with citations and local constraints
  lab: Compare one practical claim across at least three sources and document the
    result with a citation trail and clear action recommendation.
  field_task: Run the claim-check workflow on one household resilience question you
    currently care about and save the result for later modules.
  teach_forward_task: 'Teach another person the four-part claim check: who said it,
    when, with what evidence, and under what local conditions it applies.'
