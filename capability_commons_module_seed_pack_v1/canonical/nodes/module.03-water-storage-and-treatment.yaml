payload:
  week: 3
  node_refs:
  - water.safe-storage
  - water.treatment-selection
  learning_objectives:
  - Calculate daily and short-horizon household water needs in comparable units.
  - Compare treatment methods by source conditions, speed, cost, and limitations.
  - Build a practical storage table and treatment decision matrix for your context.
  seminar_outline:
  - How much water households actually need
  - Storage intervals, containers, labeling, and rotation
  - Treatment methods and where each does or does not fit
  - Decision-making under cost and source constraints
  lab: Estimate daily water demand, compare treatment options, and draft a storage
    table plus treatment decision matrix.
  field_task: Label current storage, identify the next storage increase that is feasible
    this month, and document the treatment path you would use for at least two source
    scenarios.
  teach_forward_task: Show another person how to read your treatment decision matrix
    and explain why one method is not universal.
  deliverable_refs:
