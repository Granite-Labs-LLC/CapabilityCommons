  - repair.hand-tool-literacy
  - repair.shutoffs-seals-and-patches
  learning_objectives:
  - Identify common moisture sources and conditions that make mold more likely.
  - Use basic hand tools and household shutoffs with confidence and documentation.
  - Make simple seals, patches, and temporary repairs while recording what still needs
    a durable fix.
  seminar_outline:
  - Moisture sources, hidden persistence, and mold conditions
  - Tool literacy as controlled, observable practice
  - Shutoffs, leak response, and temporary fixes
  - Documentation habits that make repair safer and repeatable
  lab: Practice tool handling, locate shutoffs, and prepare a patch kit and response
    checklist for one likely household issue.
  field_task: Create a shutoff map, document one moisture source or risk area, and
    complete one seal or temporary patch that is appropriate for your space.
  teach_forward_task: Show another person where the key shutoffs are and what your
    first three actions would be in a small leak event.
