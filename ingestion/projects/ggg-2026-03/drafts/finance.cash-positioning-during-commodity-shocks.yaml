plain_language: This guide helps you manage your investments during times of market
  chaos by holding cash, taking profits, and waiting for better opportunities.
markdown_body: '### What this is

  This is a guide on how to manage your cash position during periods of extreme market
  uncertainty, particularly during commodity shocks.


  ### Why it matters

  In times of market chaos, such as during geopolitical conflicts or significant commodity
  price fluctuations, holding cash can provide optionality and reduce risk.


  ### What you need

  Access to financial tools such as price charts, knowledge of commodity prices, and
  an understanding of yield spreads.


  ### How to do it

  1. Stay in cash to maintain flexibility. 2. Take profits from winning investments.
  3. Lighten positions in concentrated winners. 4. Wait for significant corrections
  in oil prices before re-entering the market.


  ### Common failure modes

  1. Buying too early in a volatile market. 2. Holding onto concentrated winners during
  credit stress. 3. Misinterpreting temporary market relief as a trend reversal.


  ### Safety/boundary notes

  This guide provides speculative market advice and should not be considered personalized
  financial advice.


  ### Local adaptation notes

  Cash preferences may vary based on local inflation rates and capital controls. Entry
  thresholds can differ according to market structure and economic exposure to commodities.'
