id: finance.guns-portfolio-holdings
slug: finance-guns-portfolio-holdings
canonical_title: GUNS Portfolio Holdings Table
markdown_body: '# What this is


  A portfolio holdings table is a simple record of what is currently held in a portfolio
  and how each holding is performing. In this case, the GUNS portfolio includes mixed
  assets such as currency, bitcoin, and ETFs. The table tracks practical details like
  entry date, entry price, yield, return, and position value.


  # Why it matters


  A holdings table helps you see the portfolio in one place. It makes it easier to
  compare assets, notice which positions are gaining or losing value, and review how
  the portfolio is distributed across different asset types. For a mixed portfolio,
  this kind of snapshot is especially useful because different assets may behave very
  differently.


  # What you need


  - A list of the portfolio holdings

  - Entry dates for each position

  - Entry prices or cost basis

  - Current market prices or valuation data

  - Yield and return figures, if available

  - Position values for each holding


  # How to do it


  1. List each asset in the portfolio.

  2. Record when the position was entered.

  3. Record the entry price or cost basis.

  4. Add any yield or return information that applies.

  5. Calculate or record the current value of each position.

  6. Review the table to compare performance across holdings.

  7. Update the table when prices or positions change.


  # Common failure modes


  - Treating a snapshot as if it explains the full strategy behind the portfolio

  - Comparing assets without accounting for different asset classes

  - Using stale prices or outdated position values

  - Assuming yield and return figures mean the same thing for every asset

  - Forgetting that the table shows performance at a point in time, not a permanent
  result


  # Safety/boundary notes


  This is informational content only and is not investment advice. A mixed portfolio
  can carry different kinds of risk depending on the assets included. Any interpretation
  should be made in the context of the investor''s own goals, time horizon, and risk
  tolerance.


  # Local adaptation notes


  The source suggests a mixed-asset portfolio, which means the exact allocation and
  interpretation may vary by investor. Local use may adapt the table to different
  risk tolerances, reporting formats, or asset mixes. The core structure stays the
  same: list holdings, track key metrics, and review performance over time.'
