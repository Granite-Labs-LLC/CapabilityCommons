summary_medium: This reference sheet presents a portfolio holdings table for the GUNS
  portfolio. It lists assets across mixed categories such as currency, bitcoin, and
  ETFs, along with entry dates, prices, yields, returns, and position values. The
  table is meant for review and comparison rather than as a step-by-step investing
  method.
plain_language: This object is a snapshot of a portfolio holdings table. It shows
  what assets are in the GUNS portfolio and how each position is being tracked, including
  entry date, entry price, yield, return, and current position value. Because it mixes
  asset classes, it is useful for comparing performance across different holdings,
  but it does not explain the investment thesis or why the assets were grouped together.
structured_data:
  definition: A reference table that records the holdings in a portfolio and tracks
    basic performance and valuation fields for each position.
  key_questions:
  - What assets are currently in the portfolio?
  - When was each position entered?
  - What was the entry price or cost basis?
  - What is the current value of each position?
  - How do returns compare across different asset classes?
  misconceptions:
  - A holdings table explains the full investment strategy.
  - All return and yield figures are directly comparable across every asset type.
  - A snapshot value is the same as a guaranteed future result.
