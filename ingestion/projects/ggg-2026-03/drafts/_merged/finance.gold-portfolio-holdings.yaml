summary_medium: This reference sheet presents a portfolio holdings table for a gold-focused
  strategy. It lists assets by symbol along with entry date, entry price, recent price,
  current yield, total return, and position value so a reader can compare how each
  holding is performing.
plain_language: This is a table that helps you look at a gold-focused portfolio in
  one place. It shows what is held, when each position was entered, what it cost,
  what it is worth now, and how it has performed. It is useful for quick comparison,
  but it does not explain why the positions were chosen or whether they are suitable
  for your own situation.
structured_data:
  definition: A reference table that lists the holdings in a gold-focused portfolio
    and summarizes basic performance measures for each position.
  key_questions:
  - What assets are currently in the portfolio?
  - When was each position entered?
  - How does the recent price compare with the entry price?
  - What yield, if any, is the holding producing?
  - How much total return has each position generated?
  - What is the current value of each position?
  misconceptions:
  - A holdings table is not the same as an investment recommendation.
  - A strong-looking return in a table does not guarantee future performance.
  - A portfolio table does not explain the full reasoning behind the selection of
    holdings.
  - All gold-related portfolios are not identical; composition can differ by investor
    and strategy.
