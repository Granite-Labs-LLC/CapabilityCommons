summary_medium: This reference sheet presents a portfolio holdings table for the GOATS
  portfolio. It lists multiple securities and shows key tracking fields such as entry
  date, entry price, yield, return, and current position value. It is useful for reviewing
  performance and comparing income and price movement across holdings.
plain_language: This is a portfolio table that helps you see what is in the GOATS
  portfolio and how each holding has performed. It is mainly for review and tracking,
  not for giving investment advice. You can use it to compare holdings, check gains
  or losses, and see how income and price changes contribute to overall results.
structured_data:
  definition: A portfolio holdings table that records securities in the GOATS portfolio
    and tracks basic performance fields for review.
  key_questions:
  - What securities are currently in the portfolio?
  - When was each position entered?
  - What was the entry price for each holding?
  - What yield, return, and position value does each holding show?
  - Which holdings are contributing most to income or appreciation?
  misconceptions:
  - A holdings table is the same as an investment strategy.
  - A single table can replace deeper analysis of risk, timing, and market conditions.
  - Current values in a newsletter table will remain accurate for long periods.
  - All holdings should be compared without considering different entry dates or position
    sizes.
