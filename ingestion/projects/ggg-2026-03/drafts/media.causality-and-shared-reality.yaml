summary_short: A way to think about political disagreement by separating intent from
  outcome and checking whether claims about cause are actually supported by evidence.
summary_medium: 'This concept highlights two common problems in public debate: treating
  people as if they are acting with clear intent when the evidence is weak, and making
  causal claims without enough support. It encourages people to test claims, separate
  facts from interpretation, and keep a shared reality intact even when they disagree.'
plain_language: 'When people argue about politics, they often jump too quickly to
  motives or to conclusions about what caused something. This concept says to slow
  down: ask what is actually known, what is inferred, and whether the evidence really
  supports the story being told.'
structured_data:
  definition: A concept for evaluating political and public arguments by separating
    intent from outcome and checking whether causal claims are actually supported
    by evidence.
  key_questions:
  - What is directly observed, and what is being inferred?
  - Is the claim about intent, cause, or both?
  - What evidence supports the causal story?
  - Are there alternative explanations?
  - What is known for sure, and what is still uncertain?
  misconceptions:
  - If someone disagrees with me, they must be acting in bad faith.
  - A plausible story is the same as a proven cause.
  - One event happening after another proves the first caused the second.
  - Political conflict means shared facts are impossible.
