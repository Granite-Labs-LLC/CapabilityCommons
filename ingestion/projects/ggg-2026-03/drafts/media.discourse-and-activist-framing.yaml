summary_short: How activist messaging, media amplification, and technocratic framing
  shape public understanding of environmental issues and political goals.
summary_medium: This concept explains how the same issue can be framed in different
  ways by activists, journalists, and political actors. It highlights how messaging
  choices, media attention, and expert-style language can help or hinder public understanding,
  especially in environmental politics.
plain_language: People do not just react to facts; they react to how those facts are
  presented. Activists may try to build support by naming a problem and proposing
  a shared goal. Media coverage can amplify some messages and ignore others. Technical
  or expert language can make an issue seem more objective, but it can also hide values
  and assumptions. This concept helps learners notice framing choices, compare arguments,
  and ask whether a message is trying to inform, persuade, or mobilize.
structured_data:
  definition: A concept about how activist, media, and expert-style language shape
    public understanding of environmental and political issues.
  key_questions:
  - What problem is being named?
  - What solution or goal is being proposed?
  - What language is used to persuade, explain, or mobilize?
  - What assumptions are being treated as obvious?
  - What is emphasized, and what is left out?
  - Is the disagreement about facts, methods, or values?
  misconceptions:
  - A technical-sounding argument is automatically neutral.
  - More media attention always improves public understanding.
  - If two sides disagree, they must disagree about facts rather than goals.
  - A strong movement message must be simple to the point of being vague.
  - Scientific language alone can resolve political disagreement.
