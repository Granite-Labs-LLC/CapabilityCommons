summary_medium: This skill guide explains how to evaluate political narratives and
  forecasts without being misled by confident language or model-like claims. It focuses
  on checking assumptions, watching for backfitting, and asking whether a claim still
  holds when you test it against other plausible outcomes.
plain_language: When someone makes a political claim that sounds like a model or prediction,
  do not accept it just because it sounds confident. Check what assumptions it depends
  on, whether those assumptions are actually supported, and whether the claim still
  makes sense if events turn out differently. This helps you avoid treating rhetoric
  as evidence.
