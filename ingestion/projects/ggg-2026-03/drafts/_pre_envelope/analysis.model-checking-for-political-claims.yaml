id: src.ggg.newsletter.2026-03.seg_000018
slug: analysis.model-checking-for-political-claims
canonical_title: Model Checking for Political Claims
markdown_body: '## What this is

  Model checking for political claims is the habit of testing whether a political
  explanation, forecast, or narrative actually holds up. It means asking what the
  claim assumes, what evidence supports those assumptions, and what would happen if
  the assumptions were wrong.


  ## Why it matters

  Political commentary often sounds certain even when it rests on weak evidence. A
  claim can be persuasive because it is repeated loudly, not because it has been tested.
  Model checking helps you avoid accepting a story just because it is vivid, popular,
  or emotionally satisfying.


  ## What you need

  - A specific claim, forecast, or explanation

  - The assumptions behind it

  - Evidence that supports or weakens those assumptions

  - A way to compare alternative outcomes or explanations

  - Basic scenario thinking


  ## How to do it

  1. State the claim clearly.

  2. Identify the assumptions it depends on.

  3. Ask whether those assumptions are actually supported by evidence.

  4. Check whether the claim is being adjusted after the fact to fit events that already
  happened.

  5. Compare the claim with at least one alternative explanation or outcome.

  6. Ask what would count as evidence against the claim.

  7. Separate confidence in the speaker from confidence in the model or argument.


  ## Common failure modes

  - Treating confident language as proof

  - Accepting a narrative without checking its assumptions

  - Backfitting: changing the explanation after the fact so it always seems right

  - Overweighting one dramatic example

  - Confusing propaganda or repetition with evidence

  - Ignoring uncertainty and alternative outcomes


  ## Safety/boundary notes

  Do not infer factual correctness from rhetorical confidence. A forceful tone, a
  polished presentation, or repeated media amplification does not make a claim true.
  This guide is for evaluating claims, not for deciding political allegiance.


  ## Local adaptation notes

  The source material uses examples from U.S. politics and media commentary. Those
  examples can help illustrate the method, but the skill itself is universal: it applies
  to any political claim, forecast, or model-like argument in any context.'
