bundle_overrides:
  hook: Maritime chokepoints can shape oil prices, regional security, and diplomatic
    leverage in a matter of days. Understanding this scenario helps you see why control
    of a narrow sea lane or export route can matter far beyond the immediate conflict
    zone.
  primer: 'This knowledge object is about a strategic scenario: what happens when
    a country or force tries to control a narrow maritime route, port, island, or
    shipping lane after a conflict or during a tense standoff. The basic idea is simple:
    if a lot of oil or other critical goods must pass through one place, then control
    of that place can influence who gets access, how fast shipments move, and how
    much pressure other countries feel.


    The source material uses examples tied to Iran, Kharg Island, the Straits of Hormuz,
    and outside military actors. Those details matter to the original setting, but
    the broader lesson is general. Maritime chokepoints are important because they
    connect geography to power. If shipping is delayed, blocked, or made uncertain,
    the effects can spread into energy markets, trade, diplomacy, and regional stability.


    This is not a how-to guide for military action. It is an analysis exercise. The
    goal is to think through consequences: What happens to oil flow? Which countries
    are affected? How might military presence change access? What political costs
    come with trying to hold a chokepoint? The source warns that control is not the
    same as stability. Even if a force gains temporary leverage, it may face resistance,
    mission creep, economic backlash, and long-term diplomatic fallout.


    A beginner-friendly way to approach this topic is to focus on three questions:
    What is the chokepoint? Who depends on it? What happens if access is disrupted?
    Once you can answer those, you can start to understand why maritime geography
    matters in geopolitics and energy security.'
  guide: "1. Start by identifying the chokepoint.\n   Look for the narrow sea lane,\
    \ strait, port, island, or coastal route that matters most. In this scenario,\
    \ the key idea is that a small geographic point can have outsized importance because\
    \ many shipments must pass through it.\n\n2. Map the flow of goods.\n   Ask what\
    \ is moving through the chokepoint. The source focuses on oil exports, but the\
    \ same logic can apply to other critical trade flows. Note where the shipments\
    \ come from and where they are going.\n\n3. Identify the stakeholders.\n   List\
    \ the local actors, neighboring states, major importers, shipping companies, and\
    \ outside powers that depend on the route. The source material suggests that disruptions\
    \ can affect countries far beyond the immediate conflict area.\n\n4. Analyze the\
    \ leverage.\n   Consider how control of the route might change bargaining power.\
    \ Would it raise prices, slow shipments, or create uncertainty? Would it give\
    \ one side temporary influence over negotiations or post-conflict arrangements?\n\
    \n5. Check the risks.\n   Do not assume that control automatically creates lasting\
    \ advantage. The source warns about resistance, the difficulty of holding territory,\
    \ mission creep, and wider economic and diplomatic fallout. A chokepoint can be\
    \ hard to secure and even harder to keep stable.\n\n6. Separate analysis from\
    \ action.\n   This object is for strategic thinking, not operational planning.\
    \ Keep the discussion at the level of consequences, incentives, and risks. Avoid\
    \ turning the scenario into instructions for violence or disruption.\n\n7. Evaluate\
    \ second-order effects.\n   Ask what happens after the first disruption. Oil prices\
    \ may rise, shipping may reroute, allies may refuse support, and political pressure\
    \ may increase. The source emphasizes that short-term control can create long-term\
    \ chaos.\n\n8. Write a balanced assessment.\n   Summarize both the potential strategic\
    \ benefit and the likely costs. A strong answer should explain why chokepoints\
    \ matter, who is affected, and why the outcome is uncertain.\n\nA simple template\
    \ you can use is: “If control of [chokepoint] changes, then [energy flow / access\
    \ / bargaining power] may change, which could affect [regional security / markets\
    \ / diplomacy], but the main risks are [resistance / escalation / economic fallout].”"
  reference:
  - 'Maritime chokepoint: a narrow route where shipping can be slowed, blocked, or
    monitored'
  - 'Energy export route: the path oil or gas takes from producer to market'
  - 'Oil flow disruption: interruption, delay, or uncertainty in shipment movement'
  - 'Strategic leverage: influence gained by controlling a critical route or asset'
  - 'Mission creep: when a limited objective expands into a larger, riskier one'
  - 'Second-order effects: indirect consequences that spread beyond the original event'
  - 'Regional security: how nearby states and actors are affected by instability'
  - 'Diplomatic fallout: political consequences for allies, rivals, and neutral states'
  - 'Key caution: control of a chokepoint does not guarantee stable long-term control'
  - 'Safety boundary: treat this as analysis, not as operational guidance'
  worksheet:
  - Identify one maritime chokepoint and describe why it matters in one paragraph.
  - List three groups that would be affected if shipping through the chokepoint were
    delayed.
  - Draw a simple cause-and-effect chain showing how a disruption could affect oil
    prices, trade, and diplomacy.
  - Write two possible benefits and two possible risks of trying to control the chokepoint.
  - Find one example of a second-order effect that is not immediate but could appear
    later.
  - Rewrite the scenario in neutral, non-operational language focused only on consequences.
  - Create a short risk memo that explains why control of a chokepoint may be unstable
    or temporary.
  - Compare the immediate impact of disruption with the longer-term political and
    economic impact.
  teach_forward_kit:
    three_minute_version: 'This scenario is about what happens when a force tries
      to control a narrow sea route or oil-export route after conflict. The key idea
      is that chokepoints matter because they can affect energy supplies, shipping,
      and bargaining power. But the source also warns that control is not simple:
      resistance, economic fallout, and diplomatic backlash can follow. The main lesson
      is to analyze consequences, not to treat control as a guaranteed solution.'
    ten_minute_outline:
    - Define a maritime chokepoint in plain language.
    - Explain why narrow sea routes matter for oil and trade.
    - Use the Hormuz-style example to show how disruption can affect prices and access.
    - Describe how military presence can change movement and bargaining power.
    - Highlight the difference between temporary leverage and stable control.
    - 'Review the main risks: resistance, mission creep, and wider fallout.'
    - 'Close with the safety boundary: analysis only, not operational guidance.'
    discussion_prompts:
    - Why can a small geographic point have such large economic effects?
    - What is the difference between short-term leverage and long-term control?
    - Who is affected when oil flow is disrupted beyond the immediate conflict zone?
    - Why might a plan that looks strategically useful still fail in practice?
    - How do we keep this kind of scenario in the realm of analysis rather than action?
