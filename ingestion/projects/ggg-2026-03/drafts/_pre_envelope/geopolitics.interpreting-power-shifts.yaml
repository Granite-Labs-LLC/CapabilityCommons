bundle_overrides:
  hook: Big policy moves often say one thing and do another. This bundle helps you
    read those moves as shifts in leverage, timing, and bargaining power so you can
    understand politics and markets more clearly.
  primer: 'When governments, central banks, or major political actors make a decision,
    the public explanation is usually only part of the picture. Leaders may talk in
    broad, moral, or technical language, but the practical effect of the move may
    be to change who has leverage, who is under pressure, and what terms are possible
    in future negotiations.


    This skill is about interpretation, not mind-reading. You are not trying to prove
    hidden intent. Instead, you are asking a few grounded questions: Who is acting?
    What institution or office gives them power? What constraints do they face? Why
    is this happening now, and why in this form? What changes in the real world might
    follow?


    A useful way to think about this is to compare the stated goal with the likely
    structural effect. For example, a policy may be described as protecting stability,
    but it may also raise costs for some groups, strengthen one side in a negotiation,
    or signal resolve to opponents. Market reactions, political responses, and changes
    in behavior can all reveal who gained or lost bargaining power.


    Historical comparison can help too. If a move resembles earlier cases of pressure,
    signaling, or control, that pattern may give you a better read on what is happening.
    But context matters. The same action can have different effects depending on the
    institutions involved, the local market channels, and the broader environment.


    This approach is useful in politics, economics, and statecraft because it helps
    you move beyond surface language. It trains you to notice leverage, timing, and
    consequences without overclaiming certainty. The goal is a more careful, evidence-based
    interpretation of power in action.'
  guide: "1. Start with the action itself.\n   Identify what was actually done, not\
    \ just what was said. Was it a rate change, a rule change, a sanction, a speech,\
    \ a delay, or a new condition? Then identify the actor or institution behind it.\
    \ A central bank, ministry, court, party leader, or regulator may have different\
    \ kinds of power and different limits.\n\n2. Ask who has leverage and what constraints\
    \ exist.\n   Look at the actor’s position. What tools do they control? What must\
    \ they avoid? What legal, political, market, or institutional limits shape the\
    \ decision? A move that looks bold may actually be narrow if the actor has few\
    \ options.\n\n3. Compare the stated goal with the likely structural effect.\n\
    \   Read the public explanation carefully, but do not stop there. Ask what the\
    \ decision is likely to change in practice. Does it shift control, raise pressure,\
    \ alter incentives, or change the terms of negotiation? The stated purpose and\
    \ the real effect may overlap, but they are not always the same.\n\n4. Pay attention\
    \ to timing.\n   Ask why the move happened now and why it took this form. Timing\
    \ can be a clue to bargaining strategy, response to pressure, or an attempt to\
    \ shape expectations. A decision made before a deadline, election, vote, or market\
    \ event may be designed to influence behavior.\n\n5. Watch the reactions.\n  \
    \ Market moves, political responses, and changes in behavior can show who feels\
    \ stronger or weaker after the action. If prices, borrowing costs, alliances,\
    \ or public positions shift, those reactions may reveal the practical effect of\
    \ the move.\n\n6. Use historical comparison.\n   Compare the case with similar\
    \ past events. Does it resemble a known pattern of pressure, signaling, sequencing,\
    \ or control? Historical comparison does not prove intent, but it can help you\
    \ test whether your reading is plausible.\n\n7. Stay within the evidence.\n  \
    \ Use actions, incentives, and outcomes as your main evidence. Be careful not\
    \ to treat speculation as fact. If you are unsure, say so. This is an interpretive\
    \ skill, not a method for proving hidden motives.\n\n8. Adapt to the local context.\n\
    \   The same policy can have different effects in different places. For example,\
    \ central bank decisions may affect borrowing costs, currency values, or imported\
    \ prices more strongly in some regions than others. Focus on the institutions\
    \ and market channels that matter in the setting you are studying.\n\nA simple\
    \ working template is: action, actor, leverage, constraints, timing, stated goal,\
    \ likely effect, and reaction. If you can fill in those parts, you are already\
    \ doing strong power analysis."
  reference:
  - 'Core question: What power shift does this action create?'
  - Identify the action first; do not start with the explanation.
  - Name the actor or institution behind the move.
  - 'Ask: what leverage does the actor have?'
  - 'Ask: what constraints limit the actor?'
  - 'Check timing: why now, and why in this form?'
  - Compare the stated goal with the likely structural effect.
  - Watch for market, political, or social reactions.
  - Use historical comparison to test your reading.
  - Do not treat official language as complete explanation.
  - Do not force every event into one ideology-based frame.
  - Do not ignore institutional constraints.
  - Do not miss indirect effects on markets, allies, or local actors.
  - Do not claim certainty about hidden motives without evidence.
  - Use actions, incentives, and outcomes as evidence.
  - Adapt the analysis to local institutions and market channels.
  worksheet:
  - Pick one recent policy or political move. Write down the action in one sentence,
    then name the actor or institution behind it.
  - List three forms of leverage the actor may have, and three constraints it faces.
  - Write the public explanation of the move. Then write the likely structural effect
    in plain language.
  - 'Ask and answer: Why now? Why this form? What timing clues stand out?'
  - Track one reaction from markets, allies, opponents, or local actors. What does
    that reaction suggest about bargaining power?
  - Find one historical example that seems similar. Note one way it matches and one
    way it differs.
  - Write a short interpretation that separates evidence from speculation. Label each
    sentence as either 'observed' or 'inferred.'
  - Choose a local context and explain how the same move might have different effects
    there because of institutions or market channels.
  teach_forward_kit:
    three_minute_version: 'When a government, central bank, or political leader makes
      a big move, do not stop at the public explanation. Ask four things: who is acting,
      what leverage they have, what constraints they face, and what the timing suggests.
      Then compare the stated goal with the likely real-world effect, and watch how
      markets or other actors react. The point is not to prove hidden intent, but
      to make a careful judgment about how power may be shifting.'
    ten_minute_outline:
    - '1. Define the skill: interpreting policy and political moves as acts of power.'
    - '2. Explain the key idea: public language may not fully describe the practical
      effect.'
    - '3. Walk through the core questions: actor, leverage, constraints, timing, and
      effect.'
    - 4. Show how to compare stated goals with structural effects.
    - 5. Explain why reactions from markets or political actors matter.
    - 6. Mention historical comparison as a way to test whether a move fits a known
      pattern.
    - '7. Review common mistakes: overreading ideology, trusting official language
      too much, ignoring constraints, and missing indirect effects.'
    - '8. Close with the safety boundary: interpretive skill, not proof of hidden
      intent.'
    discussion_prompts:
    - What is the difference between a public explanation and a structural effect?
    - Why might timing matter as much as the content of a policy move?
    - What kinds of reactions can reveal a shift in bargaining power?
    - When does interpretation become speculation?
    - How can local institutions change the effect of the same policy move?
