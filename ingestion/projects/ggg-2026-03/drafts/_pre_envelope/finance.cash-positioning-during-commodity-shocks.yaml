summary_medium: 'This guide describes a defensive portfolio stance during severe uncertainty:
  keep more cash, reduce exposure in strong positions, and avoid redeploying capital
  too early. The source frames cash as flexibility when markets are being driven by
  commodity shocks, credit stress, and fast-changing inflation expectations.'
plain_language: When markets are unstable and prices are being pushed around by shocks
  like war, inflation, or commodity spikes, it can make sense to be more defensive.
  The basic idea is to keep cash available, take some profits from positions that
  have run up, and wait for conditions to improve before buying again. This is not
  a rule for every market or every investor; it is a cautionary approach for periods
  when the risk of a sharp reversal or credit stress is high.
