bundle_overrides:
  hook: When markets are being jolted by war, inflation, or commodity spikes, cash
    can be a tool for staying flexible instead of getting trapped. This guide shows
    how to use a defensive stance to wait for clearer conditions, trim risk, and re-enter
    with a plan.
  primer: 'Cash positioning during a commodity shock is a defensive portfolio approach
    for periods when prices, credit, and sentiment can change very quickly. In plain
    terms, it means keeping more money in cash than usual so you are not forced to
    make rushed decisions while the market is unstable.


    The basic idea is simple: when uncertainty is unusually high, cash gives you options.
    It can help you avoid selling under pressure, reduce the chance of being stuck
    in positions that only look safe for a short time, and give you room to wait for
    better conditions. In a shock-driven market, rallies can be misleading. A price
    bounce may look like recovery, but the larger stress event may still be working
    through the system.


    This approach is especially relevant when commodity prices are moving sharply,
    credit conditions are tightening, or war-related events are creating uncertainty.
    In those settings, it can be hard to know whether a move is a temporary relief
    rally or the start of a real trend change. That is why the source guidance emphasizes
    patience, profit-taking, and waiting for clearer signals before redeploying capital.


    This is not a universal rule and it is not personalized financial advice. The
    right amount of cash depends on your situation, your risk tolerance, local inflation,
    interest rates, taxes, liquidity, and any legal or capital-control constraints.
    Different economies can also react differently to the same commodity shock, so
    a one-size-fits-all answer does not work.


    A practical way to think about this skill is: hold enough cash to stay calm, trim
    positions that have run up, and define in advance what would make you comfortable
    buying again. The goal is not to predict the exact bottom. The goal is to avoid
    being caught on the wrong side of a fast-moving market while keeping yourself
    ready for the next opportunity.'
  guide: "1. Start by checking the market context.\n   Look for signs of stress: sharp\
    \ commodity moves, widening credit spreads, rising yields, or broad market reversals.\
    \ Ask whether the market is reacting to a temporary headline or to a deeper stress\
    \ event that may last longer.\n\n2. Review your current holdings.\n   Identify\
    \ which positions have already appreciated strongly and which ones are most exposed\
    \ to a sudden reversal. In a shock environment, winners can become crowded and\
    \ vulnerable if credit tightens or sentiment turns.\n\n3. Decide how much cash\
    \ buffer you want.\n   There is no universal number. Choose a level that fits\
    \ your needs, your risk tolerance, and your local market conditions. The point\
    \ is to have enough cash available so you are not forced to sell at a bad time\
    \ or buy back too early.\n\n4. Trim where the risk-reward has changed.\n   If\
    \ a position has run up a lot, consider taking some profits off the table. The\
    \ source guidance is clear that you should not assume a strong move will continue\
    \ forever. Raising cash from winners can reduce the damage if the market breaks\
    \ again.\n\n5. Avoid confusing a bounce with a recovery.\n   A short-term rally\
    \ can happen even while the larger stress is still unresolved. Before adding risk\
    \ back, look for signs that the pressure is easing in a meaningful way, not just\
    \ for one or two good trading days.\n\n6. Watch for confirmation signals.\n  \
    \ Useful signals may include improving credit conditions, more stable commodity\
    \ prices, or a clear correction from extreme levels. The exact threshold will\
    \ vary by market structure and liquidity, so use your own criteria rather than\
    \ copying someone else’s.\n\n7. Re-enter gradually.\n   Do not put all your cash\
    \ back to work at once. Add in stages only when your criteria are met. This reduces\
    \ the chance of buying too early and gives you room to adjust if conditions worsen\
    \ again.\n\n8. Keep a written plan.\n   Write down why you are holding cash, what\
    \ would make you trim more, and what would make you redeploy capital. A written\
    \ plan helps you avoid emotional decisions during fast-moving markets.\n\n9. Re-check\
    \ the plan as conditions change.\n   Commodity shocks can affect different economies\
    \ in different ways. Local inflation, interest rates, taxes, and capital controls\
    \ can all change what is appropriate. Review your plan regularly and update it\
    \ if the environment changes.\n\n10. Treat this as a defensive tactic, not a permanent\
    \ rule.\n   Cash is useful when uncertainty is high, but staying defensive forever\
    \ can also mean missing opportunities. The skill is to use cash intentionally:\
    \ hold it when risk is elevated, then redeploy it carefully when the market gives\
    \ you a better setup.\n\nA simple rule of thumb for beginners: if you cannot clearly\
    \ explain why you are buying now, or why you are holding cash now, pause and define\
    \ the reason before acting."
  reference:
  - Cash is a flexibility tool in unstable markets.
  - Hold a larger cash buffer when uncertainty is unusually high.
  - Trim strong winners instead of assuming they will keep rising.
  - Do not confuse a short-term bounce with a real trend change.
  - 'Watch for easing stress: better credit conditions or more stable commodity prices.'
  - Re-enter gradually, not all at once.
  - Have a clear redeployment plan before you reduce risk.
  - The right cash level depends on local inflation, interest rates, taxes, liquidity,
    and capital controls.
  - This is speculative market guidance, not personalized financial advice.
  worksheet:
  - List your current holdings and mark which ones are most sensitive to a market
    break or credit stress.
  - Choose one position that has appreciated strongly and write down whether you would
    trim it, hold it, or add to it—and why.
  - Define your personal cash buffer target for a high-uncertainty period.
  - Write three signals that would tell you stress is easing enough to consider redeploying
    capital.
  - Write three signals that would make you stay defensive longer.
  - Create a gradual re-entry plan with at least two or three stages instead of one
    all-at-once purchase.
  - Identify one recent market move that might be a temporary relief rally rather
    than a true recovery.
  - Write a one-sentence rule for yourself to avoid buying back too early.
  - Review how local taxes, liquidity, or capital controls could affect your ability
    to move into or out of cash.
  teach_forward_kit:
    three_minute_version: 'In a commodity shock or war-driven inflation environment,
      markets can move fast and unpredictably. The core lesson is to use cash as flexibility:
      it helps you avoid forced decisions, trim positions that have already run up,
      and wait for clearer signs that stress is easing before buying again. The main
      mistake to avoid is treating a short-term bounce as proof that the danger is
      over. Instead, keep a larger cash buffer when uncertainty is high, define your
      re-entry criteria in advance, and add risk back gradually rather than all at
      once.'
    ten_minute_outline:
    - '1. Define the problem: commodity shocks create fast, hard-to-predict market
      moves.'
    - '2. Explain the role of cash: it buys time, flexibility, and emotional distance.'
    - '3. Show the main defensive actions: review holdings, trim winners, raise cash.'
    - '4. Explain why rallies can mislead: stress can continue even after a bounce.'
    - '5. Identify confirmation signals: improving credit conditions, stable commodity
      trends.'
    - '6. Stress gradual re-entry: use stages, not all-at-once buying.'
    - '7. Review common failure modes: buying too early, holding winners too long,
      no redeploy plan.'
    - '8. Close with the boundary note: this is not personalized advice and depends
      on local conditions.'
