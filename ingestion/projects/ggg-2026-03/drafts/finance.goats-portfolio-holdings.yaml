markdown_body: '### What this is

  The GOATS Portfolio Holdings Reference Sheet is a detailed table that lists the
  current holdings within the GOATS portfolio. It includes information on each security''s
  entry date, entry price, recent price, current yield, total return, and position
  value.


  ### Why it matters

  Understanding the composition and performance of a portfolio is crucial for making
  informed investment decisions. This sheet helps track the performance and value
  of each holding in the portfolio.


  ### What you need

  To make use of this reference sheet, you need access to the holdings table and a
  basic understanding of financial metrics such as yield, return, and position value.


  ### How to do it

  Review the table to assess each holding''s performance. Compare entry prices with
  recent prices to evaluate gains or losses. Use the yield and return percentages
  to gauge income and appreciation.


  ### Common failure modes

  The data may become outdated quickly, and there is no explicit strategy narrative
  provided in the table.


  ### Safety/boundary notes

  This information is for informational purposes only and should not be considered
  investment advice.


  ### Local adaptation notes

  The varied entry dates and position values suggest that allocation timing may be
  individualized based on specific investor needs.'
