plain_language: Electoral tail risk analysis means looking beyond today’s polls or
  headlines and asking what unusual events or slow-moving changes could still shift
  an election. It focuses on whether a shock, a split in a coalition, or a sustained
  narrative campaign could change the outcome later, even if the current situation
  looks stable.
structured_data:
  definition: A political risk framework for evaluating how shocks, elite conflict,
    coalition cohesion, and media narratives may affect election outcomes over time.
  key_questions:
  - What events could still change the race before Election Day?
  - Which risks are temporary, and which could persist?
  - Is the governing or opposition coalition holding together?
  - Are media narratives or repeated messages changing voter attitudes?
  - How does the risk picture change as time passes?
  misconceptions:
  - Current polling or sentiment will necessarily persist unchanged.
  - A short-term reaction is the same as a long-term trend.
  - Narrative campaigns cannot affect election outcomes.
  - Only major scandals matter; slower coalition changes do not.
