id: defense.quote-of-the-month-a10-thunderbolt-ii
slug: defense.quote-of-the-month-a10-thunderbolt-ii
canonical_title: 'Quote of the Month: A-10 Thunderbolt II'
markdown_body: '## What this is

  A short quoted line or soundbite used in newsletter front matter. In this case,
  the quote is attributed to the A-10 Thunderbolt II and appears to function as an
  editorial opener rather than as instructional content.


  ## Why it matters

  Editorial quotes can quickly signal the theme, tone, or subject focus of a publication.
  They can also create a memorable entry point for readers before the main content
  begins.


  ## What you need

  - A quote or short attributed line

  - A clear place to display it, such as a newsletter header or front matter section

  - Basic attribution so readers know what the quote refers to


  ## How to do it

  1. Choose a short line that fits the theme you want to introduce.

  2. Attribute it clearly enough that readers understand the source or reference.

  3. Place it where it can act as a framing element, such as the top of a newsletter
  section.

  4. Keep it brief so it supports the content instead of distracting from it.


  ## Common failure modes

  - Treating a quote as if it were an instructional step

  - Using attribution so loosely that readers cannot tell what is being referenced

  - Making the quote too long or too complex for a front-matter role

  - Assuming the quote contains operational guidance when it does not


  ## Safety/boundary notes

  This object contains a military aviation reference only. It does not provide operational,
  tactical, or technical guidance. Do not infer procedures, capabilities, or safety
  practices from the quote alone.


  ## Local adaptation notes

  Different publications may use quotes in different ways: as a theme setter, a section
  divider, or a stylistic opener. Adapt the placement and tone to match the audience
  and editorial purpose, but keep attribution clear and avoid presenting the quote
  as actionable instruction.'
