summary_short: A concept about how images and narratives can shape interpretation,
  and how complex realities are often reduced into simple, fear-driven stories.
summary_medium: This concept explains that media does not just reflect reality; it
  frames it. An image, headline, or narrative can guide attention toward a particular
  interpretation and encourage a specific response. The source uses film and crisis
  discourse to show why learners should question who is shaping the frame, what is
  being left out, and whether a complex situation is being flattened into a monolithic
  story.
plain_language: Not every image is a mirror of reality. Sometimes it is a lens that
  directs attention and shapes what people think they are seeing. This concept helps
  learners notice when a story, picture, or political message is simplifying a complex
  situation, especially when it pushes fear, certainty, or group labels. The goal
  is to pause, ask who benefits from the framing, and separate observation from interpretation.
structured_data:
  definition: A media-literacy concept about how images and narratives shape interpretation,
    and how complex realities can be reduced into overly simple, often fear-driven
    stories.
  key_questions:
  - What is this frame asking me to notice first?
  - What is directly shown, and what is being inferred?
  - What context is missing?
  - Is a complex situation being reduced to a single cause or label?
  - Who benefits from the response this framing encourages?
  misconceptions:
  - An image is always a neutral mirror of reality.
  - A simple explanation is always the most accurate one.
  - If something looks convincing, it must be complete.
  - A group or conflict can be understood through one label alone.
  - Questioning a frame means ignoring the facts.
