markdown_body: '## What this is

  A named portfolio framing concept mentioned in a newsletter heading: "Gold, Goats
  ''N Guns Portfolio." The provided source does not include the actual explanation,
  rules, or examples behind the idea.


  ## Why it matters

  Portfolio framing can help people think clearly about how to divide money across
  different goals, risk levels, and market conditions. A named framework may be useful
  if it gives a simple way to organize assets or compare tradeoffs. In this case,
  the source does not provide enough detail to say how the framework works.


  ## What you need

  - A complete source description of the framework

  - Any rules for how assets are grouped or weighted

  - Any examples showing how the portfolio is built or adjusted

  - Any stated assumptions about risk, time horizon, or market conditions


  ## How to do it

  Because the source excerpt contains only a heading, there is no reproducible procedure
  to follow from the provided material. If you want to use this concept, first locate
  the full article or original explanation. Then identify:

  1. The purpose of the portfolio framing

  2. The asset groups or categories involved

  3. The decision rules for allocation or rebalancing

  4. Any limits, exceptions, or risk controls


  ## Common failure modes

  - Assuming the name alone defines a complete strategy

  - Filling in missing rules from unrelated portfolio systems

  - Treating a headline as if it were a tested method

  - Using the concept without understanding its risk assumptions


  ## Safety/boundary notes

  This source does not provide investment instructions. Do not treat this record as
  financial advice or as a validated allocation method. Any real portfolio decision
  should be based on complete documentation, your own risk tolerance, and appropriate
  professional guidance if needed.


  ## Local adaptation notes

  If the full framework is later recovered, adapt it to your own context by checking:

  - Your time horizon

  - Your tolerance for loss and volatility

  - Your liquidity needs

  - Tax and account constraints

  - Whether the framework fits your goals and constraints


  Until then, this object should be used only as a placeholder for the named concept,
  not as an actionable investing skill.'
