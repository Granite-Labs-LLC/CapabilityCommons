summary_short: A concept for comparing idealized consensus-based politics with power-based
  political behavior.
summary_medium: This concept explains why political and geopolitical events are often
  better understood through interests, leverage, and bargaining power than through
  procedural ideals alone. It helps learners notice when a system appears cooperative
  on the surface but is actually shaped by coercion, incentives, and strategic pressure.
plain_language: 'Sometimes politics is described as if people are mainly trying to
  reach fair agreement through rules and discussion. This concept says that in real
  life, especially in state and geopolitical settings, outcomes often depend more
  on who has leverage, what each side wants, and how much pressure they can apply.
  The useful habit is to look past the official story and ask: who benefits, who can
  force a result, and what is being hidden by the process?'
structured_data:
  definition: A concept that contrasts consensus-based political explanations with
    power-based explanations, emphasizing interests, leverage, coercive bargaining,
    and strategic behavior in real-world state and geopolitical settings.
  key_questions:
  - Who has leverage in this situation?
  - What interests are each actor trying to protect or advance?
  - Is the outcome the result of shared agreement or constrained bargaining?
  - Does the formal process match the actual distribution of power?
  - What narrative might be hiding coercion or asymmetry?
  misconceptions:
  - Consensus politics always describes how decisions are actually made.
  - Institutions automatically eliminate power differences.
  - A fair-looking process means the outcome was equally negotiated.
  - Strategic actors should be treated as neutral participants.
  - Power politics means every political event is purely force-based.
