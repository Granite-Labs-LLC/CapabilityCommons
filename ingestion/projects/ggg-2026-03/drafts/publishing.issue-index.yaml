id: publishing.issue-index
slug: publishing.issue-index
canonical_title: Issue Index
markdown_body: '# What this is


  An issue index is a list that helps readers move through a newsletter or similar
  publication. It usually names sections, articles, or topics and shows the page where
  each one appears.


  # Why it matters


  An index makes a publication easier to use. Readers can quickly find what they want
  without reading the whole issue from start to finish. It is especially helpful when
  an issue has several sections or repeated topics.


  # What you need


  - The issue or newsletter itself

  - A list of the sections, article titles, or topics included

  - Page numbers or another location system

  - A consistent way to name items so readers can scan them easily


  # How to do it


  1. List the main sections or articles in the issue.

  2. Add the page number or location for each item.

  3. Keep the wording short and consistent.

  4. Check that each title matches the content and that each page reference is correct.

  5. Place the index where readers can find it easily, such as near the front of the
  issue.


  # Common failure modes


  - Missing items that should be included

  - Wrong page references

  - Inconsistent naming for similar sections

  - Too much detail, which makes the index harder to scan

  - Using the index as a substitute for actual article content


  # Safety/boundary notes


  This object is about navigation and organization, not content creation. It does
  not teach editorial judgment, fact-checking, or publishing strategy. It should not
  be treated as a complete table of contents standard unless your local publication
  uses it that way.


  # Local adaptation notes


  Different publications may organize an index in different ways. Some may use page
  numbers, while others use section labels, issue numbers, or digital links. You can
  adapt the format to fit your newsletter, archive, or reading platform as long as
  the result still helps readers find items quickly.'
