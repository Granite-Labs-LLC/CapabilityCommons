summary_medium: An issue index is a navigation aid for a newsletter or similar publication.
  It lists sections, article titles, or topics and points readers to the page where
  each item appears. It is useful for helping people scan an issue quickly, but it
  is not itself instructional content.
plain_language: An issue index is a guide to what is inside a newsletter or issue.
  It helps readers find articles or sections by showing where they appear. It is mainly
  for navigation, not for teaching a skill or explaining a topic in depth.
structured_data:
  definition: A navigation list for a newsletter or issue that maps article or section
    titles to their page locations.
  key_questions:
  - What sections or articles are included in this issue?
  - Where does each item appear?
  - Are the titles and page references accurate and consistent?
  - Will readers be able to scan the list quickly?
  misconceptions:
  - An index is the same as the full content of the issue.
  - An index must always use page numbers.
  - An index is only useful in print publications.
