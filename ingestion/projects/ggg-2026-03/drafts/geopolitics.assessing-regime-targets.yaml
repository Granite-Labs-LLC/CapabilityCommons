summary_short: A concept for analyzing conflict by focusing on interests, incentives,
  and behavior rather than taking public claims at face value.
summary_medium: This concept explains how to assess a regime or conflict actor by
  looking at power politics, hidden motivations, and competing national interests.
  It emphasizes uncertainty, inference, and the need to separate observed behavior
  from public messaging when actors may be masking intent.
plain_language: When people or states are involved in conflict, what they say publicly
  may not match what they want or plan to do. This concept is about judging actors
  by their interests, actions, and relationships instead of by slogans or emotional
  reactions. It asks you to look for patterns, compare claims with behavior, and be
  careful about what can actually be proven.
structured_data:
  definition: A concept for analyzing conflict and regime behavior by focusing on
    interests, incentives, observable actions, and the gap between public claims and
    likely intent.
  key_questions:
  - Who are the main actors, and what do they want?
  - What do their actions suggest, compared with what they say?
  - What incentives or constraints shape their behavior?
  - What evidence is direct, and what is only inferred?
  - How much uncertainty remains, and what alternative explanations fit the facts?
  misconceptions:
  - Public statements always reveal true intent.
  - Strong analysis means being certain.
  - Emotion or moral outrage is the same as evidence.
  - A single explanation is enough even when the evidence is mixed.
  - If an actor hides intent, it is impossible to analyze behavior at all.
