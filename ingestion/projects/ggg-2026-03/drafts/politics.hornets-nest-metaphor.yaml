plain_language: Sometimes a political situation can be left alone for a while, but
  if someone stirs it up, the reaction can be sudden and intense. The metaphor warns
  that provoking a tense situation without a plan can create backlash and make the
  aftermath harder to control.
structured_data:
  definition: A metaphor that describes a tense political situation as something that
    may remain quiet until disturbed, after which the response can be immediate and
    difficult to control.
  key_questions:
  - Is the situation being avoided, confronted, or provoked?
  - What reaction is likely if the situation is disturbed?
  - What costs or backlash might follow direct confrontation?
  - Is the metaphor being used to explain escalation rather than to justify action?
  misconceptions:
  - It means every tense situation should be avoided.
  - It predicts exactly what will happen in a conflict.
  - It is advice for provoking or managing violence.
  - It only applies to one local political context.
