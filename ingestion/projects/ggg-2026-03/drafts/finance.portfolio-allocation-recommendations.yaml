id: finance.portfolio-allocation-recommendations
slug: finance.portfolio-allocation-recommendations
canonical_title: Portfolio Table and Allocation Recommendations
markdown_body: '## What this is

  A portfolio table is a structured way to list investments and compare them using
  a few standard measures, such as position value, yield, and total return. In this
  source, the section title suggests allocation recommendations, but the available
  excerpt only shows holdings tables rather than a clear explanation of how allocations
  were chosen.


  ## Why it matters

  Portfolio tables help you see how money is distributed across holdings and how each
  holding is performing. They can support portfolio review by making it easier to
  compare positions, notice concentration, and track changes over time.


  ## What you need

  - A list of holdings

  - Basic performance measures such as position value, yield, and total return

  - A way to compare positions side by side

  - Enough context to know whether the table is descriptive, advisory, or both


  ## How to do it

  1. List each holding in the portfolio.

  2. Record the position value for each holding.

  3. Add performance measures such as yield and total return when available.

  4. Compare holdings to see which positions are larger, smaller, higher-yielding,
  or stronger on return.

  5. Use the table to review the portfolio, but do not assume it contains a full allocation
  method unless that method is explicitly stated.


  ## Common failure modes

  - Treating a holdings table as if it were a complete allocation policy

  - Overreading the title and assuming the excerpt contains recommendation logic that
  is not actually shown

  - Comparing performance numbers without checking what time period or calculation
  method was used

  - Using the table alone to make investment decisions without broader research


  ## Safety/boundary notes

  This is informational content, not investment advice. The excerpt available here
  does not provide enough detail to reconstruct a full allocation framework. Any use
  of the table should stay within the limits of the source and avoid unsupported assumptions.


  ## Local adaptation notes

  If you adapt this for a local portfolio review process, define your own rules for:

  - what counts as a target allocation

  - which performance metrics matter most

  - how often the table is updated

  - whether yield, total return, or position size should drive decisions


  Keep those rules separate from the source unless they are explicitly documented
  there.'
