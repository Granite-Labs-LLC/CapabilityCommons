  fitting information to preconceived notions, and considering different possible
  outcomes.
markdown_body: '# What this is

  This skill guide teaches you how to critically evaluate political claims by examining
  the models and assumptions that underpin them. It emphasizes the importance of not
  accepting narratives at face value and encourages a more analytical approach.


  # Why it matters

  In the realm of political discourse, untested models and reasoning based on amplification
  can lead to misinformation and overconfidence. By learning to check assumptions,
  you can better navigate political narratives and make informed decisions.


  # What you need

  To effectively check political models, you need access to the models themselves,
  evidence that supports or refutes them, and tools for scenario analysis.


  # How to do it

  Start by identifying the assumptions underlying a political claim. Test these assumptions
  against available evidence. Avoid backfitting, which is adjusting models to fit
  preconceived notions. Consider alternative outcomes and scenarios that differ from
  the presented narrative.


  # Common failure modes

  Common mistakes include accepting unchecked assumptions, falling for propaganda,
  and overconfidence in a single narrative.


  # Safety/boundary notes

  Do not infer factual correctness from rhetorical confidence. Be cautious of narratives
  that seem too neatly aligned with a particular ideology.


  # Local adaptation notes

  This guide references specific political contexts such as Trump, Iran, and US right-wing
  media, which may need adaptation to local political climates.'
