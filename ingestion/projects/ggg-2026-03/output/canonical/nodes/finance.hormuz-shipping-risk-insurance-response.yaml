    smallest_viable_version: Establish basic insurance coverage and AIS tracking for
      ships.
    tools:
    - Lloyd's of London insurance market
    - Chubb Ltd.
    - AIS tracking systems
    materials:
    - Insurance policy documents
    - Reinsurance agreements
    expected_time: Several weeks to establish and coordinate.
    expected_cost: Varies based on insurance premiums and geopolitical conditions.
    success_checks:
    - Insurance coverage maintained during transit.
    - Reinsurance pool operational.
    - AIS tracking data confirms safe passage.
    stop_conditions:
    - Significant geopolitical escalation.
    - Insurance market collapse.
    common_mistakes:
    - Underestimating geopolitical risks.
    - Failing to coordinate with naval forces.
    variants:
    - label: Renter
      when: For ships under temporary charter.
      notes: Ensure charter agreements include insurance clauses.
    - label: Low-budget
      when: For smaller shipping companies.
      notes: Consider pooled insurance resources.
    - label: Urban
      when: For ports near major cities.
      notes: Coordinate with local port authorities for additional security measures.
    - label: Off-grid
      when: For remote operations.
      notes: Ensure communication systems are robust and independent.
    when_to_escalate:
    - If insurance coverage is withdrawn.
    - If geopolitical tensions increase unexpectedly.
  safety_boundary: Geopolitical risk content; not financial or legal advice. Do not
    act on speculative scenarios without consulting a qualified professional.
