markdown_body: '### What this is

  This is a reference sheet for the GOLD portfolio, listing various assets and their
  financial metrics. It includes information such as the symbol, entry date, entry
  price, recent price, current yield, total return, and position value for each holding.


  ### Why it matters

  Understanding the performance of each asset in a portfolio is crucial for making
  informed investment decisions. This table provides a snapshot of the GOLD portfolio''s
  current status, helping investors assess the performance and composition of their
  investments.


  ### What you need

  To use this reference sheet effectively, you need access to the portfolio table
  and market price data to compare and analyze the performance of each holding.


  ### How to do it

  Review the table to inspect the performance of each holding. Compare the current
  yield and total return across different assets to evaluate their performance. Monitor
  the portfolio composition to ensure it aligns with your investment strategy.


  ### Common failure modes

  The table alone does not explain the selection criteria for each holding, and the
  performance figures may be time-sensitive, requiring regular updates.


  ### Safety/boundary notes

  This reference sheet is informational only and should not be considered a solicitation
  or investment advice.


  ### Local adaptation notes

  Portfolio composition may vary based on individual investor circumstances and preferences.'
