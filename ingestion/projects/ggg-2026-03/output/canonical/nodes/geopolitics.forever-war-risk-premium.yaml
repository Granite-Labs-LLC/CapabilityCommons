summary_short: A concept that recurring conflict can create a lasting cost premium
  in daily life and markets.
summary_medium: This concept explains how repeated or open-ended conflict can raise
  costs beyond the battlefield. It frames war and proxy conflict as sources of ongoing
  risk that can show up in prices, insecurity, disrupted trade, migration pressure,
  and other spillovers. It also suggests that de-escalation and peace-making can reduce
  those costs.
plain_language: When conflict keeps happening, people and markets often start paying
  extra for uncertainty. That extra cost can show up as higher prices, weaker security,
  disrupted supply chains, or pressure on communities far from the fighting. The idea
  here is that peace efforts and de-escalation can lower those costs by reducing the
  chance that conflict keeps spreading or repeating.
structured_data:
  definition: A concept describing the ongoing extra costs that can arise when conflict
    is recurring, prolonged, or treated as permanent. It links war and proxy conflict
    to a persistent risk premium in markets and daily life.
  key_questions:
  - What recurring conflict driver is creating uncertainty?
  - Which costs are showing up outside the battlefield?
  - Are the effects local, regional, or systemic?
  - Would de-escalation likely reduce the risk premium?
  - What evidence supports the claim, and what is only speculation?
  misconceptions:
  - All instability comes from one cause.
  - A risk premium means the same thing in every place.
  - Peace efforts always remove costs immediately.
  - Conflict only affects soldiers and governments.
