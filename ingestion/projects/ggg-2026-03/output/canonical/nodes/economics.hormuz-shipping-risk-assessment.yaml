summary_short: A market reference for understanding how conflict near the Strait of
  Hormuz can affect oil prices, shipping insurance, currencies, bonds, and equities.
summary_medium: This reference sheet explains how disruption risk around the Strait
  of Hormuz can move energy and financial markets. It highlights the role of chokepoints,
  shipping insurance, reinsurance, tanker delays, and market reactions across oil,
  currencies, bonds, and equities.
plain_language: When conflict threatens the Strait of Hormuz, markets often react
  before anything fully closes. Oil prices can rise, shipping insurance can get more
  expensive or harder to obtain, tankers may slow down or wait, and investors may
  move money in currencies, bonds, and stocks. This reference helps you watch the
  main signals and avoid overreacting to short-term disruption.
structured_data:
  definition: A reference sheet for assessing market and supply-chain effects when
    conflict risk threatens shipping through the Strait of Hormuz.
  key_questions:
  - Is shipping insurance or reinsurance becoming more expensive or harder to obtain?
  - Are tankers delaying, rerouting, or waiting near the chokepoint?
  - Are oil prices showing a war premium?
  - Are currencies, bonds, and equities reacting to the same risk?
  - How exposed is the local market to imported fuel or port bottlenecks?
  misconceptions:
  - If the strait is not fully closed, there is no market impact.
  - Oil prices are the only indicator worth watching.
  - Insurance changes are secondary and can be ignored.
  - A short-lived disruption has the same effect as a long-term closure.
  - All regions experience the same level of impact.
