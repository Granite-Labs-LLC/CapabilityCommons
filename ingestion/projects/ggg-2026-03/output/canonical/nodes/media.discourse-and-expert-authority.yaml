summary_short: A concept about how expert authority, shared facts, and public debate
  interact, and how alarmist framing can distort solvable problems.
summary_medium: 'This concept explains why public discussion depends on shared standards
  for evidence and why expert authority matters when people are judging complex claims.
  It also highlights a common failure mode: turning real but manageable problems into
  exaggerated, apocalyptic narratives that make clear thinking harder.'
plain_language: When people argue about complicated issues, it helps to ask what the
  evidence actually shows and whether different experts agree on the basics. This
  concept is about keeping public debate grounded in facts instead of letting dramatic
  language or assumptions turn every problem into a crisis beyond repair.
structured_data:
  definition: A concept about how shared facts and expert authority support public
    debate, and how alarmist framing can distort the understanding of real but solvable
    problems.
  key_questions:
  - What is the actual claim being made?
  - What evidence supports it?
  - Are the facts shared, or is the argument mainly rhetorical?
  - Do credible experts agree on the basics?
  - Is the issue being framed more dramatically than the evidence supports?
  - What is known, and what is only assumed?
  misconceptions:
  - If a claim sounds confident, it must be well supported.
  - Any disagreement among experts means no reliable conclusion is possible.
  - A serious problem must be described in apocalyptic terms to be taken seriously.
  - Rhetorical intensity is the same as evidence.
  - If a problem is complex, it cannot be analyzed carefully.
