summary_medium: This project blueprint outlines a strategy for controlling Iranian
  oil flow and key maritime chokepoints, aiming to shape energy access and regional
  stability after conflict. It involves securing strategic locations like Kharg Island
  and the Straits of Hormuz.
plain_language: This project involves a plan to control key maritime chokepoints in
  Iran to manage oil flow and influence regional outcomes after a conflict. It requires
  military action and careful political evaluation.
markdown_body: '# What this is

  This project blueprint describes a strategic plan for controlling maritime chokepoints
  in Iran, specifically focusing on the flow of oil through the Straits of Hormuz
  and the occupation of strategic locations like Kharg Island.


  # Why it matters

  Controlling these chokepoints is crucial for influencing energy access in the region
  and can significantly impact post-conflict geopolitical dynamics, particularly in
  relation to China''s oil supply.


  # What you need

  Military forces, knowledge of maritime geography, and understanding of energy infrastructure
  are essential for executing this strategy.


  # How to do it

  The plan involves securing key locations such as Kharg Island and the Straits of
  Hormuz, likely requiring an incursion by US Marines. The objective is to control
  oil flow post-conflict without engaging in nation-building.


  # Common failure modes

  Potential issues include recklessness in execution, mission creep, and failure to
  maintain control over the oil supply.


  # Safety/boundary notes

  This blueprint contains military speculation and is not an operational plan. It
  should not be used as guidance for violence.


  # Local adaptation notes

  The strategy is specific to the geopolitical context of Iran, including local islands
  and US domestic politics.'
