summary_short: A plain-language reference on innocent passage, territorial waters,
  and how maritime boundaries affect shipping rights.
summary_medium: This reference explains the basic legal idea of innocent passage in
  maritime law, how territorial waters differ from open shipping routes, and why disputes
  over interference with commercial shipping can become politically and legally serious.
plain_language: Countries have rights over waters near their coasts, but international
  law also protects some kinds of ship travel through those waters. The key idea is
  that not every ship moving near a coast is violating sovereignty. To understand
  a dispute, you have to check the legal status of the water, the route being used,
  and whether the passage is considered innocent under the relevant rules.
structured_data:
  definition: A reference on the legal idea that ships may sometimes pass through
    a coastal state's territorial waters without violating that state's sovereignty,
    if the passage meets the conditions for innocent passage.
  key_questions:
  - What maritime zone is the ship in?
  - Does the route fall within territorial waters or another legal zone?
  - Does the passage qualify as innocent under the applicable law?
  - Is the claim about interference with shipping supported by the facts and the legal
    framework?
  - Are the examples being used as legal evidence or only as illustrations?
  misconceptions:
  - All movement near a coast is illegal.
  - Territorial waters and shipping lanes are the same thing.
  - Any interference with shipping is automatically an act of war.
  - A regional example proves the rule in every case.
  - Political claims and legal conclusions are interchangeable.
