id: law.maritime-rights-and-innocent-passage
slug: law.maritime-rights-and-innocent-passage
canonical_title: Maritime Rights and Innocent Passage
markdown_body: "## What this is\nThis is a reference sheet about maritime passage\
  \ rights, especially the idea of **innocent passage** under the law of the sea.\
  \ It helps explain the difference between a state's control over nearby waters and\
  \ the rights of ships to move through those waters.\n\n## Why it matters\nDisputes\
  \ at sea can involve trade, security, sovereignty, and international law at the\
  \ same time. If a ship is moving through a coastal state's waters, the legal question\
  \ is not only where the ship is, but also what kind of waters those are and whether\
  \ the passage is allowed. Getting this wrong can lead to serious political claims,\
  \ including claims that interference with shipping is unlawful or escalatory.\n\n\
  ## What you need\n- The relevant legal text, especially UNCLOS or another applicable\
  \ maritime framework\n- A map of maritime boundaries and territorial waters\n- Information\
  \ about the shipping route or lane in question\n- A way to distinguish territorial\
  \ waters from other maritime zones\n\n## How to do it\n1. Identify the water area\
  \ involved.\n   - Check whether the route is in territorial waters, a transit area,\
  \ or another maritime zone.\n2. Check the legal rule that applies.\n   - Under the\
  \ innocent passage idea, some travel through territorial waters is allowed if it\
  \ meets the legal conditions.\n3. Separate sovereignty from route access.\n   -\
  \ A state may have rights over nearby waters, but that does not automatically mean\
  \ all passage is forbidden.\n4. Compare the ship's route with the legal boundary.\n\
  \   - Use maritime maps and route data to see whether the vessel is actually inside\
  \ a claimed area.\n5. Verify any claim about unlawful interference.\n   - A claim\
  \ that stopping or threatening commercial shipping is an act of war is a serious\
  \ legal and political argument and should be checked against the facts and the governing\
  \ law.\n\n## Common failure modes\n- Confusing territorial waters with open shipping\
  \ lanes\n- Treating every coastal-water passage as a violation\n- Assuming a legal\
  \ claim is correct without checking the boundary and the governing law\n- Overstating\
  \ what counts as an act of war\n- Mixing up political rhetoric with legal status\n\
  \n## Safety/boundary notes\n- Legal claims in the source should be independently\
  \ verified.\n- This is not legal advice.\n- Maritime law can depend on the exact\
  \ location, the state involved, and the treaty or rule being applied.\n\n## Local\
  \ adaptation notes\nThe source uses examples involving Iran, Oman, regional shipping\
  \ routes, and a Hudson River analogy. Those examples help illustrate the idea, but\
  \ the core rule is general: always check the maritime zone, the route, and the applicable\
  \ legal framework before drawing conclusions."
