plain_language: This is a standard disclaimer for investment-related writing. It tells
  readers not to treat the publication as a recommendation to buy or sell anything.
  It also says that investing can lose money, that past results do not predict future
  results, and that people should check the facts and get advice that fits their own
  situation.
structured_data:
  definition: A standard investment disclaimer that states the content is informational
    only, not personalized advice, and not a guarantee of results.
  key_questions:
  - Is the reader being told this is general information rather than advice?
  - Does the notice clearly say that investing involves risk?
  - Does it warn that past performance does not guarantee future results?
  - Does it encourage due diligence and, when appropriate, professional advice?
  - Does it avoid implying a promise of profit or a solicitation to buy or sell?
  misconceptions:
  - This publication is a guarantee of profit.
  - Past performance means future performance will be the same.
  - General investment commentary is the same as personal financial advice.
  - A disclaimer removes all investment risk.
  - Professional advice is unnecessary for any investment decision.
