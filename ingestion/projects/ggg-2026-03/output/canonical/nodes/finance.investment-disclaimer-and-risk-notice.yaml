id: finance.investment-disclaimer-and-risk-notice
slug: finance-investment-disclaimer-and-risk-notice
canonical_title: Investment Disclaimer and Risk Notice
markdown_body: '## What this is

  This is a disclaimer and risk notice used in investment-related communication. It
  tells readers that the material is provided for information only. It is not a promise
  of profit, not a guarantee of future results, and not a direct instruction to buy
  or sell any investment.


  ## Why it matters

  Investment decisions can lead to gains or losses. A clear disclaimer helps set expectations,
  reduces the chance that readers mistake general commentary for personal advice,
  and reminds people to make their own judgment. It also reinforces that past performance
  does not ensure future performance.


  ## What you need

  - The disclaimer text itself

  - A clear understanding that the publication is informational

  - Awareness that investment decisions should be based on personal circumstances

  - A process for due diligence before acting on any investment idea

  - Access to qualified professional advice when needed


  ## How to do it

  1. Read the publication as general information, not as a guarantee or recommendation.

  2. Check the facts for yourself before making any investment decision.

  3. Consider whether the idea fits your goals, time horizon, and risk tolerance.

  4. Seek professional advice if you are unsure or if the decision is significant.

  5. Remember that even well-researched investments can lose value.


  ## Common failure modes

  - Treating the publication as personalized financial advice

  - Assuming a past return means future returns will be similar

  - Ignoring risk because the material sounds confident

  - Skipping due diligence before investing

  - Overlooking the possibility of partial or complete loss of capital


  ## Safety/boundary notes

  This notice does not make an offer to sell or a solicitation to buy any security
  or investment product. It does not guarantee future performance. Investment outcomes
  can vary, and losses can occur, including the possibility of losing all invested
  capital. Readers should make decisions based on their own circumstances and risk
  tolerance.


  ## Local adaptation notes

  The exact wording should match the publication, jurisdiction, and regulatory context.
  If the audience is in a specific market, the disclaimer may need to reflect local
  legal requirements, terminology, and disclosure rules. Any mention of suitability,
  tax treatment, or product-specific risk should be adapted to the actual offering
  and audience.'
